name: Build Browser to EXE

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install opencv-python numpy mss pyinstaller

    - name: Build EXE
      run: |
        # هنا قمنا بتغيير الاسم ليتطابق مع ملفك الفعلي وتجنب الخطأ السابق
        pyinstaller --onefile --noconsole ballpool.py

    - name: Upload Result
      uses: actions/upload-artifact@v4
      with:
        name: Billiards-Tool-EXE
        path: dist/ballpool.exe
