name: Build Browser to EXE

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest  # سيرفر ويندوز مخصص لبناء ملفات الـ EXE المتوافقة

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # تثبيت كافة المكتبات الأساسية ومكتبات التحكم بويندوز والأزرار التي أضفناها للكود
        pip install opencv-python numpy mss pyinstaller keyboard pywin32

    - name: Build EXE
      run: |
        # تحويل ملف ballpool.py إلى ملف تنفيذي واحد مدمج (--onefile)
        # وإخفاء نافذة الدوس السوداء (--noconsole) ليعمل كـ Overlay احترافي
        pyinstaller --onefile --noconsole ballpool.py

    - name: Upload Result
      uses: actions/upload-artifact@v4
      with:
        name: Billiards-Tool-EXE
        path: dist/ballpool.exe
