name: Build Browser to EXE

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest  # بيئة ويندوز مخصصة لتجميع ملفات EXE المتوافقة

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # تثبيت كافة المكتبات المطلوبة بما فيها PyGame للرسم الشفاف المباشر و مكتبات التحكم بويندوز
        pip install opencv-python numpy mss pyinstaller keyboard pywin32 pygame

    - name: Build EXE
      run: |
        # تحويل السكربت إلى ملف تنفيذي واحد مدمج (--onefile) 
        # وإلغاء نافذة الـ CMD السوداء المرافقة (--noconsole) ليعمل كـ Overlay سحري مخفي
        pyinstaller --onefile --noconsole ballpool.py

    - name: Upload Result
      uses: actions/upload-artifact@v4
      with:
        name: Billiards-Overlay-EXE
        path: dist/ballpool.exe
