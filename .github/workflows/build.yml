name: Build Billiards Tool to EXE

on:
  push:
    branches:
      - main
      - master

jobs:

  build:

    runs-on: windows-latest

    steps:

      # =========================================
      # Checkout
      # =========================================

      - name: Checkout Repository
        uses: actions/checkout@v4

      # =========================================
      # Python
      # =========================================

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # =========================================
      # Upgrade Pip
      # =========================================

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # =========================================
      # Install Dependencies
      # =========================================

      - name: Install Dependencies
        run: |
          pip install numpy
          pip install opencv-python
          pip install pygame
          pip install pywin32
          pip install keyboard
          pip install mss
          pip install comtypes
          pip install dxcam
          pip install pyinstaller

      # =========================================
      # Verify Imports
      # =========================================

      - name: Verify Imports
        run: |
          python -c "import cv2"
          python -c "import pygame"
          python -c "import numpy"
          python -c "import keyboard"
          python -c "import mss"
          python -c "import comtypes"
          python -c "import dxcam"

      # =========================================
      # Build EXE
      # =========================================

      - name: Build EXE
        run: >
          pyinstaller
          --onefile
          --noconsole
          --clean
          --collect-all pygame
          --collect-all cv2
          --collect-all dxcam
          --hidden-import=dxcam
          --hidden-import=comtypes
          --hidden-import=win32gui
          --hidden-import=win32con
          --hidden-import=win32api
          --hidden-import=pygame
          --hidden-import=cv2
          --hidden-import=numpy
          ballpool.py

      # =========================================
      # Upload Artifact
      # =========================================

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Billiards-Overlay
          path: dist/ballpool.exe
