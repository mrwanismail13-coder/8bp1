name: Build Billiards Tool to EXE

on:
  push:
    branches:
      - main
      - master

jobs:

  build:

    runs-on: windows-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Dependencies
        run: |
          pip install numpy
          pip install opencv-python
          pip install pygame
          pip install pywin32
          pip install keyboard
          pip install mss
          pip install pyinstaller

          pip install dxcam --no-deps || echo "dxcam failed"

      - name: Verify DXCAM
        run: |
          python -c "import dxcam; print('DXCAM OK')"

      - name: Build EXE
        run: >
          pyinstaller
          --onefile
          --noconsole
          --clean
          --collect-all pygame
          --collect-all cv2
          --collect-all dxcam
          --hidden-import=dxcam
          --hidden-import=win32gui
          --hidden-import=win32con
          --hidden-import=win32api
          ballpool.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Billiards-Overlay
          path: dist/ballpool.exe
